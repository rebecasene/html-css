<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            width: 400px;
            border-collapse: collapse;

        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
        
        .destaque{
            background-color: gray;
            color: white;
            text-align: center;
        }
        .num {
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th scope="col", rowspan="2" class="destaque">Área</th>
                <th scope="col", rowspan="2" class="destaque">Diciplinas</th>
                <th scope="col", colspan="2" class="destaque">Notas</th>
                <th scope="col", rowspan="2" class="destaque">Média</th>
            </tr>
            <tr>
                <th scope="col" class="destaque">Nota 1</th>
                <th scope="col" class="destaque">Nota 2</th>
            </tr>
            <tr>
                <th scope="row", rowspan="4">Exatas</th>
                <td>Matemática</td>
                <td class="num">7,0</td>
                <td class="num">8,0</td>
                <td class="num">7,5</td>
            </tr>
            <tr>
                <td>Física</td>
                <td class="num">6,0</td>
                <td class="num">9,0</td>
                <td class="num">7,5</td>
            </tr>
            <tr>
                <td>Química</td>
                <td class="num">5,0</td>
                <td class="num">7,0</td>
                <td class="num">6,0</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td class="num">8,0</td>
                <td class="num">10,0</td>
                <td class="num">9,0</td>
            </tr>
            <tr>
                <th scope="row", colspan="4" style="text-align: left;" class="destaque">Médias Exatas</th>
                <td class="destaque">7,5</td>
            </tr>
            <tr>
                <th scope="row", rowspan="2">Humanas</th>
                <td>História</td>
                <td class="num">7,0</td>
                <td class="num">9,0</td>
                <td class="num">8,0</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td class="num">6,0</td>
                <td class="num">8,0</td>
                <td class="num">7,0</td>
            </tr>
            <tr>
                <th scope="row", colspan="4", style="text-align: left;" class="destaque">Médias Humanas</th>
                <td class="destaque">7,5</td>
            </tr>
        </thead>
    </table>
</body>
</html>
