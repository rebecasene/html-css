<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astronauta</title>
    <style>
        body {
            margin: 0px;
            margin-bottom: 0px;
        }
        #fora {
            position: relative;
            height: 100vh;
            padding: 10px;
            background-color: black;
            background-image: url(imagens/espaco.jpg);
            background-size: 100% 100%;
            
        }

        #dentro {
            background-image: url(imagens/astronauta.png);
            position: absolute;
            height: 500px;
            width: 500px;
            background-size: 100% 100%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <section id="fora">
        <article id="dentro">

        </article>
    </section>
</body>
</html>
