<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        /* Configurações globais das CSS */
        * {
            height: 100%;
        }
        body {
            background-color: rgb(47, 122, 122);
            background-image: linear-gradient(to right, #C49DCA, #705175)
        }
    </style>
</head>
<body>
    <h1>Testando gradiente</h1>
</body>
</html>
